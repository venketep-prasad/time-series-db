 * The settings file is used to specify which projects to include in your build.
 *
 * Detailed information about configuring a multi-project build in Gradle can be found
 * in the user manual at https://docs.gradle.org/6.5.1/userguide/multi_project_builds.html
 */

rootProject.name = 'tsdb'

// Include benchmarks subproject
include 'benchmarks'

// Include benchmark-telemetry plugin only when explicitly requested via -PbenchmarkTelemetry.
// This prevents the plugin zip from being built and packaged in production builds,
// where it would conflict with the production OTel telemetry plugin.
if (gradle.startParameter.projectProperties.containsKey('benchmarkTelemetry')) {
    include 'benchmark-telemetry'
}
